name: publish

on:
  workflow_dispatch:
  push:
    tags:
      - 'monolib-dart-v[0-9]+.[0-9]+.[0-9]+*'
      - 'monolib-flutter-v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  publish-monolib-dart:
    if: startsWith(github.ref, 'refs/tags/monolib-dart-v') || github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write # Required for authentication using OIDC
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      working-directory: monolib-dart

  publish-monolib-flutter:
    if: startsWith(github.ref, 'refs/tags/monolib-flutter-v') || github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write # Required for authentication using OIDC
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      working-directory: monolib-flutter
