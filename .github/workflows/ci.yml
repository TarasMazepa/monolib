name: ci

on:
  push:
    branches: [ "main" ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  monolib-dart:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: monolib-dart

    steps:
      - uses: actions/checkout@v4

      - uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          cache: true
          cache-sdk: true

      - run: dart pub get

      - run: dart format --output=none --set-exit-if-changed .

      - run: dart analyze --fatal-infos

      - run: dart test

  monolib-flutter:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: monolib-flutter

    steps:
      - uses: actions/checkout@v4

      - uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          cache: true
          cache-sdk: true

      - run: flutter pub get

      - run: dart format --output=none --set-exit-if-changed .

      - run: flutter analyze --fatal-infos

      - run: flutter test
