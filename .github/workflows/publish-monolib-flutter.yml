name: publish-monolib-flutter.yml

on:
  workflow_dispatch:
  push:
    tags:
      - 'monolib-flutter-v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  publish-monolib-flutter:
    if: startsWith(github.ref, 'refs/tags/monolib-flutter-v')
    permissions:
      id-token: write # Required for authentication using OIDC
      contents: write # Required to create the GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1

      - uses: flutter-actions/setup-flutter@v4
        with:
          cache: true
          cache-sdk: true

      - run: dart pub get
        working-directory: monolib-flutter

      - run: dart pub publish --dry-run
        working-directory: monolib-flutter

      - run: dart pub publish -f
        working-directory: monolib-flutter

      - run: gh release create "$TAG" --title "Monolib Flutter v${TAG#monolib-flutter-v}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.PAT }}
          TAG: ${{ github.ref_name }}
