name: publish-monolib-dart.yml

on:
  workflow_dispatch:
  push:
    tags:
      - 'monolib-dart-v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  publish-monolib-dart:
    if: startsWith(github.ref, 'refs/tags/monolib-dart-v')
    permissions:
      id-token: write # Required for authentication using OIDC
      contents: write # Required to create the GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1

      - run: dart pub get
        working-directory: monolib-dart

      - run: dart pub publish --dry-run
        working-directory: monolib-dart

      - run: dart pub publish -f
        working-directory: monolib-dart

      - run: gh release create "$TAG" --title "Monolib Dart v${TAG#monolib-dart-v}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
